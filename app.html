<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalorier & Protein</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style1.css" />
</head>
<body>

  <div class="card">
    <h1><i class="fa-solid fa-fire-flame-curved"></i> Kalorier & Protein</h1>
    <p class="intro">Fyll i dina uppgifter så räknar vi ut ditt dagliga behov av kalorier och protein.</p>

    <div class="form-row">
      <div class="form-group">
        <label for="vikt"><i class="fa-solid fa-weight-scale"></i> Vikt (kg)</label>
        <input type="number" id="vikt" placeholder="t.ex. 75" min="30" max="300" />
      </div>
      <div class="form-group">
        <label for="langd"><i class="fa-solid fa-ruler-vertical"></i> Längd (cm)</label>
        <input type="number" id="langd" placeholder="t.ex. 175" min="100" max="250" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="alder"><i class="fa-solid fa-cake-candles"></i> Ålder</label>
        <input type="number" id="alder" placeholder="t.ex. 25" min="10" max="100" />
      </div>
      <div class="form-group">
        <label for="kon">Kön</label>
        <select id="kon">
          <option value="">-- Välj --</option>
          <option value="man">Man</option>
          <option value="kvinna">Kvinna</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="aktivitet"><i class="fa-solid fa-person-running"></i> Aktivitetsnivå</label>
      <select id="aktivitet">
        <option value="">-- Välj --</option>
        <option value="1.2">Stillasittande (lite eller ingen träning)</option>
        <option value="1.375">Lätt aktiv (1–3 dagar/vecka)</option>
        <option value="1.55">Måttligt aktiv (3–5 dagar/vecka)</option>
        <option value="1.725">Mycket aktiv (6–7 dagar/vecka)</option>
        <option value="1.9">Extremt aktiv (tungt fysiskt arbete)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mal"><i class="fa-solid fa-bullseye"></i> Mål</label>
      <select id="mal">
        <option value="">-- Välj --</option>
        <option value="minska">Gå ner i vikt</option>
        <option value="behalla">Behålla vikten</option>
        <option value="oka">Gå upp i vikt / bygga muskler</option>
      </select>
    </div>

    <button onclick="berakna()">
      <i class="fa-solid fa-calculator"></i> Beräkna mitt behov
    </button>

    <div id="resultat" class="resultat dold">
      <div class="resultat-rad">
        <div class="resultat-box" id="box-kalorier">
          <i class="fa-solid fa-fire"></i>
          <span class="etikett">Kalorier/dag</span>
          <span class="varde" id="ut-kalorier">–</span>
          <span class="enhet">kcal</span>
        </div>
        <div class="resultat-box" id="box-protein">
          <i class="fa-solid fa-drumstick-bite"></i>
          <span class="etikett">Protein/dag</span>
          <span class="varde" id="ut-protein">–</span>
          <span class="enhet">gram</span>
        </div>
      </div>
      <p id="rad-mal" class="mal-text"></p>
      <div id="tips-lista" class="tips"></div>
    </div>
  </div>

 <script src="script1.js"></script>
</body>
</html>
